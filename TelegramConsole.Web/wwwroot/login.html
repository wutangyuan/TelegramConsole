<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#071a35">
  <title>登录 - TelegramConsole NAS</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, "Segoe UI", "Microsoft YaHei UI", sans-serif;
      --primary: #2e9bff;
      --primary-strong: #1687ed;
      --text: #f7fbff;
      --muted: #9db0c8;
      --line: rgba(255,255,255,.12);
    }

    * { box-sizing: border-box; }
    html, body { width: 100%; min-height: 100%; margin: 0; }
    body {
      min-height: 100vh;
      overflow: hidden;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 14%, rgba(28,128,226,.38), transparent 28%),
        radial-gradient(circle at 78% 78%, rgba(12,188,204,.22), transparent 30%),
        linear-gradient(125deg, #061326 0%, #081d38 48%, #06152a 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .38;
      background-image:
        linear-gradient(rgba(255,255,255,.028) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.028) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: linear-gradient(to right, #000, transparent 82%);
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(2px);
      pointer-events: none;
    }
    .orb-one { width: 430px; height: 430px; left: -180px; bottom: -190px; border: 1px solid rgba(65,172,255,.28); box-shadow: inset 0 0 90px rgba(40,150,255,.08); }
    .orb-two { width: 160px; height: 160px; left: 48%; top: 7%; background: rgba(38,170,255,.07); border: 1px solid rgba(104,205,255,.16); }

    .page-shell {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(390px, 470px);
      align-items: center;
      gap: clamp(48px, 8vw, 140px);
      width: min(1240px, calc(100% - 72px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 48px 0;
    }

    .brand { max-width: 620px; padding-left: 16px; }
    .brand-mark {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 42px;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: .4px;
    }
    .logo {
      display: grid;
      place-items: center;
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: linear-gradient(145deg, #48b4ff, #167de5);
      box-shadow: 0 12px 32px rgba(18,130,237,.42);
    }
    .logo svg { width: 27px; height: 27px; }
    .brand h1 {
      max-width: 600px;
      margin: 0 0 22px;
      font-size: clamp(42px, 5vw, 68px);
      line-height: 1.08;
      letter-spacing: -2px;
    }
    .brand h1 span {
      display: block;
      color: transparent;
      background: linear-gradient(90deg, #51b9ff, #70e3ed);
      background-clip: text;
    }
    .brand-copy { max-width: 520px; margin: 0; color: #a9bad0; font-size: 17px; line-height: 1.8; }
    .features { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 34px; }
    .feature {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 13px;
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 999px;
      color: #bdd0e4;
      background: rgba(255,255,255,.035);
      font-size: 13px;
    }
    .feature i { width: 6px; height: 6px; border-radius: 50%; background: #48d8d1; box-shadow: 0 0 10px #48d8d1; }

    .login-card {
      position: relative;
      width: 100%;
      padding: 42px 42px 36px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 24px;
      background: linear-gradient(150deg, rgba(17,42,73,.86), rgba(8,27,53,.76));
      box-shadow: 0 30px 80px rgba(0,0,0,.38), inset 0 1px 0 rgba(255,255,255,.08);
      backdrop-filter: blur(22px);
    }
    .login-card::before {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      right: -80px;
      top: -95px;
      border-radius: 50%;
      background: rgba(53,164,255,.15);
      filter: blur(4px);
    }
    .mobile-logo { display: none; }
    .login-card h2 { position: relative; margin: 0 0 9px; font-size: 29px; letter-spacing: -.6px; }
    .subtitle { position: relative; margin: 0 0 32px; color: var(--muted); font-size: 14px; }

    .field { margin-bottom: 19px; }
    .field label { display: block; margin-bottom: 9px; color: #c8d7e8; font-size: 13px; font-weight: 600; }
    .input-shell {
      display: flex;
      align-items: center;
      height: 50px;
      border: 1px solid var(--line);
      border-radius: 11px;
      background: rgba(2,15,32,.48);
      transition: border-color .2s, box-shadow .2s, background .2s;
    }
    .input-shell:focus-within { border-color: rgba(56,164,255,.82); background: rgba(4,20,42,.68); box-shadow: 0 0 0 3px rgba(37,145,244,.13); }
    .input-icon { width: 19px; height: 19px; margin-left: 15px; color: #7891ad; flex: none; }
    .input-shell input {
      min-width: 0;
      flex: 1;
      height: 100%;
      padding: 0 13px;
      border: 0;
      outline: 0;
      color: #f7fbff;
      background: transparent;
      font: inherit;
    }
    .input-shell input::placeholder { color: #637992; }
    .password-toggle {
      display: grid;
      place-items: center;
      width: 46px;
      height: 46px;
      padding: 0;
      border: 0;
      color: #8197b1;
      background: transparent;
      cursor: pointer;
    }
    .password-toggle:hover { color: #cbd9e8; }
    .password-toggle svg { width: 19px; height: 19px; }

    .form-options { display: flex; align-items: center; justify-content: space-between; margin: 2px 0 24px; }
    .remember { display: inline-flex; align-items: center; gap: 9px; color: #9eb1c8; font-size: 13px; cursor: pointer; }
    .remember input { width: 16px; height: 16px; accent-color: var(--primary); }
    .secure-tip { color: #687f99; font-size: 12px; }

    .submit-button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      width: 100%;
      height: 50px;
      border: 0;
      border-radius: 11px;
      color: #fff;
      background: linear-gradient(110deg, var(--primary-strong), #35b0ff);
      box-shadow: 0 12px 25px rgba(16,129,226,.28);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: .5px;
      cursor: pointer;
      transition: transform .15s, filter .15s, opacity .15s;
    }
    .submit-button:hover { filter: brightness(1.08); transform: translateY(-1px); }
    .submit-button:active { transform: translateY(0); }
    .submit-button:disabled { opacity: .55; cursor: not-allowed; transform: none; }
    .spinner { display: none; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.35); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }
    .submit-button.loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #error { min-height: 21px; margin-top: 15px; color: #ff8c9b; font-size: 13px; text-align: center; }
    .card-footer { margin: 16px 0 0; color: #617891; font-size: 12px; text-align: center; }

    @media (max-width: 900px) {
      body { overflow: auto; }
      .page-shell { grid-template-columns: 1fr; width: min(470px, calc(100% - 36px)); gap: 28px; padding: 42px 0; }
      .brand { display: none; }
      .mobile-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 30px; font-weight: 700; }
      .mobile-logo .logo { width: 42px; height: 42px; border-radius: 12px; }
    }

    @media (max-width: 520px) {
      .page-shell { width: calc(100% - 24px); padding: 24px 0; }
      .login-card { padding: 30px 24px 26px; border-radius: 19px; }
      .login-card h2 { font-size: 25px; }
      .secure-tip { display: none; }
    }
  </style>
</head>
<body>
  <div class="orb orb-one"></div>
  <div class="orb orb-two"></div>
  <main class="page-shell">
    <section class="brand" aria-label="产品介绍">
      <div class="brand-mark">
        <span class="logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none"><path d="M20.2 4.1 3.7 10.5c-1.1.4-1.1 1.1-.2 1.4l4.2 1.3 1.6 5c.2.7.1.9.8.9.5 0 .8-.2 1-.5l2.1-2 4.4 3.2c.8.5 1.4.3 1.6-.8l2.8-13.4c.3-1.3-.5-1.9-1.8-1.5Z" fill="currentColor"/><path d="m9 13 8.5-5.3c.4-.3.8-.1.5.2l-7 6.4-.3 3.1L9 13Z" fill="#167de5"/></svg>
        </span>
        TelegramConsole NAS
      </div>
      <h1>你的 Telegram，<span>始终在线。</span></h1>
      <p class="brand-copy">专为 NAS 与 Docker 打造的多账户 Telegram 控制中心，让消息监控、定时任务和自动化规则持续可靠运行。</p>
      <div class="features">
        <span class="feature"><i></i>多账户工作区</span>
        <span class="feature"><i></i>消息实时监控</span>
        <span class="feature"><i></i>自动化任务</span>
      </div>
    </section>

    <section class="login-card">
      <div class="mobile-logo">
        <span class="logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none"><path d="M20.2 4.1 3.7 10.5c-1.1.4-1.1 1.1-.2 1.4l4.2 1.3 1.6 5c.2.7.1.9.8.9.5 0 .8-.2 1-.5l2.1-2 4.4 3.2c.8.5 1.4.3 1.6-.8l2.8-13.4c.3-1.3-.5-1.9-1.8-1.5Z" fill="currentColor"/></svg>
        </span>
        TelegramConsole NAS
      </div>
      <h2>欢迎回来</h2>
      <p class="subtitle">登录你的管理控制台，继续管理工作区</p>

      <form id="login-form">
        <div class="field">
          <label for="username">账号</label>
          <div class="input-shell">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4.5 20c.7-4 3.2-6 7.5-6s6.8 2 7.5 6"/></svg>
            <input id="username" name="username" type="text" value="admin" autocomplete="username" placeholder="请输入账号" required>
          </div>
        </div>
        <div class="field">
          <label for="password">密码</label>
          <div class="input-shell">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="5" y="10" width="14" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
            <input id="password" name="password" type="password" autocomplete="current-password" placeholder="请输入密码" autofocus required>
            <button class="password-toggle" id="password-toggle" type="button" aria-label="显示密码" title="显示密码">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"/><circle cx="12" cy="12" r="2.7"/></svg>
            </button>
          </div>
        </div>
        <div class="form-options">
          <label class="remember"><input id="remember" type="checkbox" checked> 保持登录</label>
          <span class="secure-tip">安全 Cookie 会话</span>
        </div>
        <button class="submit-button" id="submit" type="submit"><span class="spinner"></span><span id="submit-text">登 录</span></button>
        <div id="error" role="alert"></div>
      </form>
      <p class="card-footer">TelegramConsole · NAS Edition</p>
    </section>
  </main>

  <script>
    const form = document.getElementById('login-form');
    const submit = document.getElementById('submit');
    const submitText = document.getElementById('submit-text');
    const error = document.getElementById('error');
    const password = document.getElementById('password');
    const passwordToggle = document.getElementById('password-toggle');

    passwordToggle.addEventListener('click', () => {
      const showing = password.type === 'text';
      password.type = showing ? 'password' : 'text';
      passwordToggle.setAttribute('aria-label', showing ? '显示密码' : '隐藏密码');
      passwordToggle.title = showing ? '显示密码' : '隐藏密码';
      password.focus();
    });

    form.addEventListener('submit', async event => {
      event.preventDefault();
      submit.disabled = true;
      submit.classList.add('loading');
      submitText.textContent = '登录中…';
      error.textContent = '';
      try {
        const response = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value.trim(),
            password: password.value,
            rememberMe: document.getElementById('remember').checked
          })
        });
        if (!response.ok) {
          const problem = await response.json().catch(() => ({}));
          throw new Error(problem.detail || '登录失败');
        }
        location.replace('/index.html?v=20260717-settings');
      } catch (ex) {
        error.textContent = ex.message || '登录失败，请稍后重试';
      } finally {
        submit.disabled = false;
        submit.classList.remove('loading');
        submitText.textContent = '登 录';
      }
    });
  </script>
</body>
</html>
