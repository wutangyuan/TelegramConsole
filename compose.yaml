services:
  telegram-console:
    build:
      context: .
      dockerfile: Dockerfile
    image: telegramconsole-nas:local
    container_name: telegramconsole-nas
    restart: unless-stopped
    environment:
      ASPNETCORE_URLS: http://+:8080
      TELEGRAMCONSOLE_DATA_DIR: /app/data
      TELEGRAMCONSOLE_ADMIN_PASSWORD: ${TELEGRAMCONSOLE_ADMIN_PASSWORD:?请在 .env 中设置管理密码}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${TELEGRAMCONSOLE_PORT:-5080}:8080"
    volumes:
      - telegramconsole-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8080/health/live"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true

volumes:
  telegramconsole-data:
    name: telegramconsole-data

